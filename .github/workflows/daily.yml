name: cloakroom-daily

# Cron is UTC. GitHub's free scheduler is best-effort and often delayed by hours, so we
# fire hourly through the early-morning window (07:00-14:00 UTC = roughly 2am-9am ET).
# src/index.js builds once, on the FIRST run of the day that hasn't built yet, so the
# build normally lands in the early morning with hours of buffer before 9am ET. Later
# runs that day no-op. A punctual deadline still needs the external trigger (see README).
on:
  schedule:
    - cron: "0 7 * * *"
    - cron: "0 8 * * *"
    - cron: "0 9 * * *"
    - cron: "0 10 * * *"
    - cron: "0 11 * * *"
    - cron: "0 12 * * *"
    - cron: "0 13 * * *"
    - cron: "0 14 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force a build regardless of the ET-hour guard"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build daily.json
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
          MODEL: ${{ vars.MODEL }}
          FORCE: ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}
        run: npm start

      - name: Validate daily.json
        run: npm run validate

      - name: Commit if changed
        run: |
          git config user.name "cloakroom-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "daily: refresh $(date -u +%Y-%m-%d)"
            # Retry with rebase so a concurrent push to main doesn't fail the run.
            for i in 1 2 3; do
              git push && break
              echo "push rejected, rebasing and retrying ($i)..."
              git pull --rebase origin main
            done
          fi
