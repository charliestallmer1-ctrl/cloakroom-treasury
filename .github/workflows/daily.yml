name: cloakroom-daily

# Cron is UTC and ignores DST, and GitHub's free scheduler is often delayed by hours.
# So we fire hourly from 13:00-19:00 UTC, which covers ~9am-2pm ET in both EDT and EST.
# src/index.js builds once, on the first run at/after 9am ET that hasn't built that day;
# every later run that day no-ops. More slots = better odds of an early build despite delays.
on:
  schedule:
    - cron: "0 13 * * *"
    - cron: "0 14 * * *"
    - cron: "0 15 * * *"
    - cron: "0 16 * * *"
    - cron: "0 17 * * *"
    - cron: "0 18 * * *"
    - cron: "0 19 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force a build regardless of the ET-hour guard"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build daily.json
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
          MODEL: ${{ vars.MODEL }}
          FORCE: ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}
        run: npm start

      - name: Validate daily.json
        run: npm run validate

      - name: Commit if changed
        run: |
          git config user.name "cloakroom-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "daily: refresh $(date -u +%Y-%m-%d)"
            git push
          fi
